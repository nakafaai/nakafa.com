  - '@rolldown/binding-linux-arm-gnueabihf@1.0.2'
  - '@rolldown/binding-linux-arm64-gnu@1.0.2'
  - '@rolldown/binding-linux-arm64-musl@1.0.2'
  - '@rolldown/binding-linux-ppc64-gnu@1.0.2'
