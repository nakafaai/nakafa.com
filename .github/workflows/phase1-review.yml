name: Phase 1 Review

on:
  repository_dispatch:
    types: [phase1-review]

permissions: {}

concurrency:
  group: phase1-review-proof
  cancel-in-progress: false

jobs:
  prove:
    if: ${{ always() }}
    permissions:
      actions: read
      checks: write
      contents: read
      pull-requests: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ github.sha }}
      - uses: ./.github/actions/phase1-proof
        if: ${{ always() }}
        with:
          check-name: phase1-review
